<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>Reporting System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- LOGIN -->

    <div id="loginSection" class="card">

        <h1>Login</h1>

        <div class="grid">

            <input type="text"
                id="username"
                placeholder="Username">

            <input type="password"
                id="password"
                placeholder="Password">

        </div>

        <br>

        <button onclick="login()">
            Login
        </button>

    </div>

    <!-- APP -->

    <div id="appSection" class="hidden">

        <div class="card">

            <div class="flex header">

                <h1>Reporting System</h1>

                <button class="logout-btn"
                    onclick="logout()">

                    Logout

                </button>

            </div>

        </div>

        <!-- ADD REPORT -->

        <div class="card">

            <h2>Add Report</h2>

            <div class="grid">

                <input type="text"
                    id="reportName"
                    placeholder="Report Name">

                <input type="text"
                    id="reportType"
                    placeholder="Type">

                <select id="reportSeverity">

                    <option value="">
                        Select Severity
                    </option>

                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>

                </select>

            </div>

            <br>

            <textarea id="reportDescription"
                placeholder="Description"></textarea>

            <br>

            <button onclick="saveReport()">
                Save Report
            </button>

        </div>

        <!-- FILTERS -->

        <div class="card">

            <h2>Filters</h2>

            <div class="grid">

                <input type="text"
                    id="filterName"
                    placeholder="Filter by Name">

                <input type="text"
                    id="filterType"
                    placeholder="Filter by Type">

                <select id="filterSeverity">

                    <option value="">
                        All Severities
                    </option>

                    <option>Low</option>
                    <option>Medium</option>
                    <option>High</option>

                </select>

                <input type="date"
                    id="filterFrom">

                <input type="date"
                    id="filterTo">

                <select id="globalFilter">

                    <option value="all">
                        All Reports
                    </option>

                    <option value="personal">
                        My Reports
                    </option>

                </select>

            </div>

            <br>

            <button onclick="renderReports()">
                Apply Filters
            </button>

        </div>

        <!-- TABLE -->

        <div class="card">

            <h2>Reports</h2>

            <table>

                <thead>

                    <tr>

                        <th>ID</th>
                        <th>Name</th>
                        <th>Type</th>
                        <th>Severity</th>
                        <th>Timestamp</th>
                        <th>Description</th>
                        <th>User</th>
                        <th>Actions</th>

                    </tr>

                </thead>

                <tbody id="reportTable"></tbody>

            </table>

        </div>

    </div>

</div>

<!-- EDIT MODAL -->

<div id="editModal" class="modal hidden">

    <div class="modal-content">

        <h2>Edit Report</h2>

        <div class="grid">

            <input type="text"
                id="editName"
                placeholder="Report Name">

            <input type="text"
                id="editType"
                placeholder="Type">

            <select id="editSeverity">

                <option>Low</option>
                <option>Medium</option>
                <option>High</option>

            </select>

        </div>

        <br>

        <textarea id="editDescription"></textarea>

        <div class="modal-buttons">

            <button onclick="updateReport()">
                Save Changes
            </button>

            <button class="cancel-btn"
                onclick="closeModal()">

                Cancel

            </button>

        </div>

    </div>

</div>

<!-- DELETE MODAL -->

<div id="deleteModal" class="modal hidden">

    <div class="modal-content">

        <h2>Delete Report</h2>

        <br>

        <p>
            Are you sure you want to delete this report?
        </p>

        <div class="modal-buttons">

            <button class="delete-btn"
                onclick="confirmDelete()">

                Delete

            </button>

            <button class="cancel-btn"
                onclick="closeDeleteModal()">

                Cancel

            </button>

        </div>

    </div>

</div>

<!-- jsPDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="script.js"></script>

</body>
</html>
