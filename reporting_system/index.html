<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporting System</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
<div id="loginSection" class="card">
    <h1>Login</h1>
    <div class="grid">
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
    </div>
    <br>
    <button onclick="login()">Login</button>
    <p id="loginError" class="error-text"></p>
</div>

<div id="appSection" class="hidden">

    <div class="card">
        <div class="flex header">
            <h1>Reporting System</h1>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="card">
        <h2>Add Report</h2>
        <div class="grid">
            <input type="text" id="reportName" placeholder="Report Name">
            <input type="text" id="reportType" placeholder="Type">

            <select id="reportSeverity">
                <option value="">Select Severity</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <select id="reportOwner">
                <option value="">Select Owner</option>
            </select>
        </div>
        <br>
        <textarea id="reportDescription" placeholder="Description"></textarea>
        <br>
        <button onclick="saveReport()">Save Report</button>
    </div>

    <div class="card">
        <h2>Filters</h2>
        <div class="filters-row">
            <input type="text" id="filterName" placeholder="Name" oninput="renderReports()">
            <input type="text" id="filterType" placeholder="Type" oninput="renderReports()">
            <input type="text" id="filterUser" placeholder="User" oninput="renderReports()">
            
            <select id="filterOwner" onchange="renderReports()">
                <option value="">Owner (All)</option>
            </select>

            <input type="text" id="filterDescription" placeholder="Description" oninput="renderReports()">

            <select id="filterSeverity" onchange="renderReports()">
                <option value="">Severity</option>
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <input type="date" id="filterFrom" onchange="renderReports()">
            <input type="date" id="filterTo" onchange="renderReports()">
        </div>
    </div>

    <div class="card">
        <h2>Reports</h2>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Type</th>
                    <th>Severity</th>
                    <th>Timestamp</th>
                    <th>Description</th>
                    <th>User</th>
                    <th>Owner</th> <th>Actions</th>
                </tr>
            </thead>
            <tbody id="reportTable"></tbody>
        </table>

        <div class="pagination">
            <div class="pagination-left">
                <select id="reportsPerPageSelect" onchange="changeReportsPerPage()">
                    <option value="5">5</option>
                    <option value="10">10</option>
                    <option value="15">15</option>
                    <option value="20">20</option>
                    <option value="25">25</option>
                    <option value="30">30</option>
                    <option value="35">35</option>
                    <option value="40">40</option>
                    <option value="50">50</option>
                </select>
            </div>
            <div class="pagination-center">
                <span id="pageInfo">Page 1 of 1</span>
            </div>
            <div class="pagination-right">
                <button onclick="prevPage()">Previous</button>
                <button onclick="nextPage()">Next</button>
            </div>
        </div>
    </div>
</div>

<div id="editModal" class="hidden">
    <div class="modal-content">
        <h2>Edit Report</h2>
        <div class="grid">
            <input type="text" id="editName" placeholder="Name">
            <input type="text" id="editType" placeholder="Type">

            <select id="editSeverity">
                <option>Low</option>
                <option>Medium</option>
                <option>High</option>
            </select>

            <select id="editOwner">
                <option value="">Select Owner</option>
            </select>
        </div>
        <br>
        <textarea id="editDescription" placeholder="Description"></textarea>
        <div class="modal-buttons">
            <button onclick="updateReport()">Save Changes</button>
            <button onclick="closeEditModal()">Cancel</button>
        </div>
    </div>
</div>

<div id="deleteModal" class="hidden">
    <div class="modal-content">
        <h2>Delete Report</h2>
        <p>Are you sure you want to delete this report?</p>
        <div class="modal-buttons">
            <button class="delete-btn" onclick="confirmDelete()">Delete</button>
            <button class="cancel-btn" onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="script.js"></script>

</body>
</html>
